# Example stack: gateway + Postgres (batch) + MinIO (S3-compatible inbox/outbound).
# Copy to docker-compose.override.yml or run: docker compose -f docker-compose.yml -f docker-compose.example.yml up
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pii
      POSTGRES_PASSWORD: pii
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pii -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  pii-gateway:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config/examples/config.example.yaml:/etc/pii-gateway/config.yaml:ro
      - gateway-data:/data
    environment:
      PII_GATEWAY_CONFIG_PATH: /etc/pii-gateway/config.yaml
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: /data/out
      POSTGRES_BATCH_DSN: postgresql+asyncpg://pii:pii@postgres:5432/app
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
      AWS_REGION: us-east-1
      INBOX_S3_BUCKET: inbox
      INBOX_S3_PREFIX: ""

volumes:
  pgdata:
  miniodata:
  gateway-data:
